<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>Сканер QR-кода | Лояльность</title>
    <script src="https://unpkg.com/jsqr@1.4.0/dist/jsQR.js"></script>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            background: #000;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
        }

        /* Контейнер для видео */
        .video-container {
            position: relative;
            width: 100%;
            flex: 1;
            display: flex;
            align-items: center;
            justify-content: center;
            background: #000;
            min-height: 300px;
        }

        video {
            width: 100%;
            height: auto;
            max-height: 80vh;
            object-fit: cover;
        }

        /* Оверлей с рамкой сканирования */
        .scanner-overlay {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            width: 250px;
            height: 250px;
            border: 2px solid #00ff88;
            box-shadow: 0 0 0 9999px rgba(0, 0, 0, 0.5);
            border-radius: 16px;
        }

        .scanner-overlay::before,
        .scanner-overlay::after {
            content: '';
            position: absolute;
            width: 40px;
            height: 40px;
            border-color: #00ff88;
            border-style: solid;
        }

        .scanner-overlay::before {
            top: -2px;
            left: -2px;
            border-width: 4px 0 0 4px;
            border-radius: 8px 0 0 0;
        }

        .scanner-overlay::after {
            bottom: -2px;
            right: -2px;
            border-width: 0 4px 4px 0;
            border-radius: 0 0 8px 0;
        }

        /* Нижняя панель */
        .info-panel {
            background: rgba(0, 0, 0, 0.9);
            backdrop-filter: blur(10px);
            padding: 16px 20px;
            border-top: 1px solid rgba(255, 255, 255, 0.1);
        }

        .status {
            text-align: center;
            font-size: 14px;
            color: #ccc;
            margin-bottom: 12px;
        }

        .status.success {
            color: #00ff88;
        }

        .status.error {
            color: #ff4444;
        }

        .button {
            display: block;
            width: 100%;
            padding: 14px;
            background: #00ff88;
            color: #000;
            border: none;
            border-radius: 12px;
            font-size: 16px;
            font-weight: 600;
            cursor: pointer;
            text-align: center;
            margin-top: 8px;
        }

        .button.secondary {
            background: rgba(255, 255, 255, 0.2);
            color: #fff;
        }

        .button:hover {
            opacity: 0.9;
        }

        .loading {
            display: inline-block;
            width: 20px;
            height: 20px;
            border: 2px solid #fff;
            border-radius: 50%;
            border-top-color: transparent;
            animation: spin 0.6s linear infinite;
            vertical-align: middle;
            margin-right: 8px;
        }

        @keyframes spin {
            to { transform: rotate(360deg); }
        }

        .hidden {
            display: none;
        }
    </style>
</head>
<body>
    <div class="video-container">
        <video id="video" autoplay playsinline muted></video>
        <div class="scanner-overlay" id="overlay"></div>
    </div>
    <div class="info-panel">
        <div class="status" id="status">📷 Наведите камеру на QR-код</div>
        <button class="button secondary" id="switchCameraBtn" style="display: none;">🔄 Переключить камеру</button>
        <button class="button" id="closeBtn">✖️ Закрыть</button>
    </div>

    <script>
        const tg = window.Telegram.WebApp;
        tg.ready();
        tg.expand();
        
        // Элементы
        const video = document.getElementById('video');
        const statusDiv = document.getElementById('status');
        const closeBtn = document.getElementById('closeBtn');
        const switchCameraBtn = document.getElementById('switchCameraBtn');
        const overlay = document.getElementById('overlay');
        
        // Состояние
        let currentStream = null;
        let useFrontCamera = false;
        let scanning = true;
        let scanTimeout = null;
        
        // Закрыть Web App
        closeBtn.addEventListener('click', () => {
            tg.close();
        });
        
        // Переключение камеры
        switchCameraBtn.addEventListener('click', () => {
            useFrontCamera = !useFrontCamera;
            startCamera();
        });
        
        // Запуск камеры
        async function startCamera() {
            if (currentStream) {
                currentStream.getTracks().forEach(track => track.stop());
            }
            
            const constraints = {
                video: {
                    facingMode: useFrontCamera ? 'user' : 'environment'
                }
            };
            
            try {
                const stream = await navigator.mediaDevices.getUserMedia(constraints);
                currentStream = stream;
                video.srcObject = stream;
                video.play();
                statusDiv.textContent = '📷 Сканирование...';
                statusDiv.className = 'status';
                overlay.style.display = 'block';
                switchCameraBtn.style.display = 'block';
                startScanning();
            } catch (err) {
                console.error('Camera error:', err);
                statusDiv.textContent = '❌ Ошибка доступа к камере. Разрешите доступ и перезагрузите страницу.';
                statusDiv.className = 'status error';
                overlay.style.display = 'none';
                switchCameraBtn.style.display = 'none';
            }
        }
        
        // Сканирование кадра
        function startScanning() {
            if (!video.readyState || video.readyState !== video.HAVE_ENOUGH_DATA) {
                requestAnimationFrame(() => startScanning());
                return;
            }
            
            const canvas = document.createElement('canvas');
            const ctx = canvas.getContext('2d');
            
            function scanFrame() {
                if (!scanning) return;
                
                if (video.readyState === video.HAVE_ENOUGH_DATA) {
                    canvas.width = video.videoWidth;
                    canvas.height = video.videoHeight;
                    ctx.drawImage(video, 0, 0, canvas.width, canvas.height);
                    const imageData = ctx.getImageData(0, 0, canvas.width, canvas.height);
                    const code = jsQR(imageData.data, canvas.width, canvas.height);
                    
                    if (code && code.data) {
                        // Найден QR-код
                        scanning = false;
                        statusDiv.innerHTML = '<span class="loading"></span> Проверка QR-кода...';
                        statusDiv.className = 'status';
                        
                        // Отправляем данные в бот
                        try {
                            tg.sendData(code.data);
                            statusDiv.textContent = '✅ QR распознан! Возвращаемся в бот...';
                            statusDiv.className = 'status success';
                            
                            // Закрываем Web App через 1 секунду
                            setTimeout(() => {
                                tg.close();
                            }, 1000);
                            return;
                        } catch (e) {
                            console.error('Send error:', e);
                            statusDiv.textContent = '❌ Ошибка отправки данных. Попробуйте снова.';
                            statusDiv.className = 'status error';
                            scanning = true;
                            requestAnimationFrame(scanFrame);
                            return;
                        }
                    }
                }
                requestAnimationFrame(scanFrame);
            }
            
            scanFrame();
        }
        
        // Обработка ошибок Telegram Web App
        tg.onEvent('mainButtonClicked', () => {
            tg.close();
        });
        
        // Запускаем камеру при загрузке
        startCamera();
        
        // Очистка при закрытии
        window.addEventListener('beforeunload', () => {
            if (currentStream) {
                currentStream.getTracks().forEach(track => track.stop());
            }
        });
    </script>
</body>
</html>
