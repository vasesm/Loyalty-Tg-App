<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>Сканер QR | Лояльность</title>
    <script src="https://unpkg.com/jsqr@1.4.0/dist/jsQR.js"></script>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            background: #000;
            min-height: 100vh;
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
        }
        .video-wrapper {
            position: relative;
            width: 100%;
            height: 60vh;
            background: #000;
            overflow: hidden;
        }
        video {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            object-fit: cover;
        }
        .overlay {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            width: 250px;
            height: 250px;
            border: 2px solid #00ff88;
            border-radius: 16px;
            box-shadow: 0 0 0 9999px rgba(0,0,0,0.6);
        }
        .panel {
            background: rgba(0,0,0,0.95);
            padding: 16px;
        }
        .status {
            text-align: center;
            font-size: 14px;
            color: #aaa;
            margin-bottom: 12px;
        }
        .status.success { color: #00ff88; }
        .status.error { color: #ff4444; }
        .btn {
            width: 100%;
            padding: 14px;
            background: #00ff88;
            color: #000;
            border: none;
            border-radius: 12px;
            font-size: 16px;
            font-weight: 600;
            cursor: pointer;
            margin-top: 8px;
        }
        .btn.close {
            background: #333;
            color: #fff;
        }
        .token-box {
            background: #1a1a1a;
            padding: 12px;
            border-radius: 12px;
            margin-top: 12px;
            border: 1px solid #333;
        }
        .token-label {
            font-size: 12px;
            color: #888;
            margin-bottom: 6px;
        }
        .token-value {
            font-family: monospace;
            font-size: 11px;
            color: #00ff88;
            word-break: break-all;
            background: #0a0a0a;
            padding: 8px;
            border-radius: 8px;
            user-select: all;
        }
        .hidden { display: none; }
    </style>
</head>
<body>
    <div class="video-wrapper">
        <video id="video" autoplay playsinline muted></video>
        <div class="overlay" id="overlay"></div>
    </div>
    <div class="panel">
        <div class="status" id="status">📷 Наведите на QR-код</div>
        <div id="tokenPanel" class="hidden">
            <div class="token-box">
                <div class="token-label">🔑 Токен для вставки в бот:</div>
                <div class="token-value" id="tokenValue"></div>
            </div>
        </div>
        <button class="btn close" id="closeBtn">✖️ Закрыть</button>
    </div>

    <script>
        const tg = window.Telegram.WebApp;
        tg.ready();
        tg.expand();
        
        const video = document.getElementById('video');
        const statusDiv = document.getElementById('status');
        const closeBtn = document.getElementById('closeBtn');
        const tokenPanel = document.getElementById('tokenPanel');
        const tokenValue = document.getElementById('tokenValue');
        
        let stream = null;
        let scanning = true;
        
        closeBtn.onclick = () => tg.close();
        
        async function initCamera() {
            try {
                stream = await navigator.mediaDevices.getUserMedia({
                    video: { facingMode: 'environment' }
                });
                video.srcObject = stream;
                video.play();
                startScanning();
            } catch (err) {
                statusDiv.textContent = '❌ Нет доступа к камере';
                statusDiv.className = 'status error';
            }
        }
        
        function startScanning() {
            const canvas = document.createElement('canvas');
            const ctx = canvas.getContext('2d');
            
            function scan() {
                if (!scanning) return;
                if (video.readyState === 4 && video.videoWidth > 0) {
                    canvas.width = video.videoWidth;
                    canvas.height = video.videoHeight;
                    ctx.drawImage(video, 0, 0, canvas.width, canvas.height);
                    const img = ctx.getImageData(0, 0, canvas.width, canvas.height);
                    const code = jsQR(img.data, canvas.width, canvas.height);
                    
                    if (code && code.data) {
                        scanning = false;
                        const token = code.data;
                        
                        statusDiv.textContent = '✅ QR распознан! Скопируйте токен:';
                        statusDiv.className = 'status success';
                        
                        // Показываем токен
                        tokenValue.textContent = token;
                        tokenPanel.classList.remove('hidden');
                        
                        // Пытаемся также отправить через Web App (если вдруг заработает)
                        try {
                            tg.sendData(token);
                        } catch(e) {}
                        return;
                    }
                }
                requestAnimationFrame(scan);
            }
            scan();
        }
        
        initCamera();
        
        window.onbeforeunload = () => {
            if (stream) stream.getTracks().forEach(t => t.stop());
        };
    </script>
</body>
</html>
