<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>Сканер QR-кода | Лояльность</title>
    <script src="https://unpkg.com/jsqr@1.4.0/dist/jsQR.js"></script>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            background: #000;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
        }
        .video-container {
            position: relative;
            width: 100%;
            flex: 1;
            display: flex;
            align-items: center;
            justify-content: center;
            background: #000;
            min-height: 300px;
        }
        video {
            width: 100%;
            height: auto;
            max-height: 80vh;
            object-fit: cover;
        }
        .scanner-overlay {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            width: 250px;
            height: 250px;
            border: 2px solid #00ff88;
            box-shadow: 0 0 0 9999px rgba(0, 0, 0, 0.5);
            border-radius: 16px;
        }
        .info-panel {
            background: rgba(0, 0, 0, 0.9);
            backdrop-filter: blur(10px);
            padding: 16px 20px;
            border-top: 1px solid rgba(255, 255, 255, 0.1);
        }
        .status {
            text-align: center;
            font-size: 14px;
            color: #ccc;
            margin-bottom: 12px;
        }
        .status.success { color: #00ff88; }
        .status.error { color: #ff4444; }
        .button {
            display: block;
            width: 100%;
            padding: 14px;
            background: #00ff88;
            color: #000;
            border: none;
            border-radius: 12px;
            font-size: 16px;
            font-weight: 600;
            cursor: pointer;
            text-align: center;
            margin-top: 8px;
        }
        .button.secondary {
            background: rgba(255, 255, 255, 0.2);
            color: #fff;
        }
        .hidden { display: none; }
    </style>
</head>
<body>
    <div class="video-container">
        <video id="video" autoplay playsinline muted></video>
        <div class="scanner-overlay" id="overlay"></div>
    </div>
    <div class="info-panel">
        <div class="status" id="status">📷 Наведите камеру на QR-код</div>
        <button class="button secondary" id="closeBtn">✖️ Закрыть</button>
    </div>

    <script>
        const tg = window.Telegram.WebApp;
        tg.ready();
        tg.expand();
        
        const video = document.getElementById('video');
        const statusDiv = document.getElementById('status');
        const closeBtn = document.getElementById('closeBtn');
        
        let currentStream = null;
        let scanning = true;
        
        closeBtn.addEventListener('click', () => {
            tg.close();
        });
        
        async function startCamera() {
            try {
                const stream = await navigator.mediaDevices.getUserMedia({ video: { facingMode: 'environment' } });
                currentStream = stream;
                video.srcObject = stream;
                video.play();
                statusDiv.textContent = '📷 Сканирование...';
                startScanning();
            } catch (err) {
                console.error('Camera error:', err);
                statusDiv.textContent = '❌ Ошибка доступа к камере. Разрешите доступ и перезагрузите страницу.';
                statusDiv.className = 'status error';
            }
        }
        
        function startScanning() {
            const canvas = document.createElement('canvas');
            const ctx = canvas.getContext('2d');
            
            function scanFrame() {
                if (!scanning) return;
                if (video.readyState === video.HAVE_ENOUGH_DATA && video.videoWidth > 0) {
                    canvas.width = video.videoWidth;
                    canvas.height = video.videoHeight;
                    ctx.drawImage(video, 0, 0, canvas.width, canvas.height);
                    const imageData = ctx.getImageData(0, 0, canvas.width, canvas.height);
                    const code = jsQR(imageData.data, canvas.width, canvas.height);
                    
                    if (code && code.data) {
                        scanning = false;
                        statusDiv.textContent = '✅ QR распознан! Отправка в бот...';
                        statusDiv.className = 'status success';
                        try {
                            tg.sendData(code.data);
                            setTimeout(() => tg.close(), 1000);
                        } catch (e) {
                            statusDiv.textContent = '❌ Ошибка отправки. Закройте вручную.';
                        }
                        return;
                    }
                }
                requestAnimationFrame(scanFrame);
            }
            scanFrame();
        }
        
        startCamera();
        
        window.addEventListener('beforeunload', () => {
            if (currentStream) {
                currentStream.getTracks().forEach(track => track.stop());
            }
        });
    </script>
</body>
</html>
